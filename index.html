<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0c4a6e" />
    <meta
      name="description"
      content="Lac Edja Fish Map: a seasonal, interactive catch map for Lac Edja in Blue Sea, Outaouais, Québec. Log catches by season and share them with family."
    />
    <title>Lac Edja Fish Map</title>
    <script>
      // Set the theme before paint to avoid a flash of the wrong mode.
      (function () {
        try {
          var pref = localStorage.getItem('edja-theme') || 'system'
          var dark =
            pref === 'dark' ||
            (pref === 'system' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.dataset.theme = dark ? 'dark' : 'light'
        } catch (e) {
          document.documentElement.dataset.theme = 'light'
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
