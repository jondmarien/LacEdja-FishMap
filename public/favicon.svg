<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Lac Edja">
  <defs>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0e6d91"/>
      <stop offset="0.55" stop-color="#0c4a6e"/>
      <stop offset="1" stop-color="#083344"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed deep-water badge (safe for maskable icons) -->
  <rect width="512" height="512" rx="120" fill="url(#water)"/>

  <!-- Leaping fish -->
  <g transform="rotate(-18 256 240)">
    <!-- dorsal + pectoral fins -->
    <path d="M250 212 L268 176 L300 216 Z" fill="#a5f0fc" opacity="0.9"/>
    <path d="M268 266 L250 304 L300 276 Z" fill="#a5f0fc" opacity="0.9"/>
    <!-- forked tail -->
    <path d="M180 248 L128 210 L154 248 L128 290 Z" fill="#67e3f9"/>
    <!-- body -->
    <path d="M360 248 C320 206 232 202 178 248 C232 296 320 292 360 248 Z" fill="#ecfeff"/>
    <!-- gill line -->
    <path d="M300 216 C288 234 288 264 300 280" stroke="#67e3f9" stroke-width="9" stroke-linecap="round" fill="none"/>
    <!-- eye -->
    <circle cx="332" cy="240" r="11" fill="#0c4a6e"/>
  </g>

  <!-- Lake surface -->
  <g stroke="#a5f0fc" stroke-width="14" stroke-linecap="round" fill="none" opacity="0.85">
    <path d="M96 372 C140 350 180 350 224 372 C268 394 308 394 352 372 C384 356 408 354 432 364"/>
    <path d="M120 418 C160 400 196 400 236 418 C276 436 312 436 352 418" opacity="0.6"/>
  </g>
</svg>
